<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | Miss South Africa Disability</title>
  <meta name="description" content="Get in touch with Miss South Africa Disability. Contact us via form, social media, WhatsApp, or visit us using the embedded map." />
  <meta name="keywords" content="Miss South Africa Disability contact, contact form, social media, WhatsApp chat, location map" />
  <meta name="author" content="Miss South Africa Disability" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- Header and Navigation -->
  <header>
    <nav id="nav" class="navbar" aria-label="Primary Navigation">
      <div class="nav-container">
        <a href="index.html" class="nav-logo" aria-label="Miss South Africa Disability Home">
          <img src="/images/logo.svg" alt="Miss South Africa Disability Logo" loading="lazy" />
        </a>
        <button id="nav-toggle" class="nav-toggle" aria-controls="primary-menu" aria-expanded="false" aria-label="Toggle navigation menu">
          <span class="hamburger"></span>
        </button>
        <ul id="primary-menu" class="nav-menu" role="menubar">
          <li role="none"><a role="menuitem" href="index.html" tabindex="0">Home</a></li>
          <li role="none"><a role="menuitem" href="about.html" tabindex="0">About</a></li>
          <li role="none"><a role="menuitem" href="apply.html" tabindex="0">Apply</a></li>
          <li role="none"><a role="menuitem" href="events.html" tabindex="0">Events</a></li>
          <li role="none"><a role="menuitem" href="advocacy.html" tabindex="0">Advocacy</a></li>
          <li role="none"><a role="menuitem" href="sponsors.html" tabindex="0">Sponsors</a></li>
          <li role="none"><a role="menuitem" href="contact.html" tabindex="0">Contact</a></li>
        </ul>
        <button id="contrast-toggle" aria-pressed="false" aria-label="Toggle high contrast mode" class="contrast-toggle">High Contrast</button>
      </div>
    </nav>
  </header>

  <main id="maincontent">
    <!-- Hero Section -->
    <section class="page-hero" role="banner" aria-label="Contact page hero">
      <div class="hero-overlay">
        <h1>Contact Us</h1>
        <p class="tagline">We'd love to hear from you. Reach out with any questions or support inquiries.</p>
      </div>
    </section>

    <!-- Contact Form -->
    <section class="contact-form-section" aria-label="Contact form">
      <div class="container">
        <h2>Send Us a Message</h2>
        <form id="contact-form" novalidate>
          <div class="form-group">
            <label for="contact-name">Name *</label>
            <input type="text" id="contact-name" name="contact-name" required aria-required="true" />
            <span class="error-message" aria-live="polite"></span>
          </div>
          <div class="form-group">
            <label for="contact-email">Email *</label>
            <input type="email" id="contact-email" name="contact-email" required aria-required="true" />
            <span class="error-message" aria-live="polite"></span>
          </div>
          <div class="form-group">
            <label for="contact-message">Message *</label>
            <textarea id="contact-message" name="contact-message" rows="5" required aria-required="true"></textarea>
            <span class="error-message" aria-live="polite"></span>
          </div>
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </div>
    </section>

    <!-- Google Map Embed -->
    <section class="map-section" aria-label="Location map">
      <div class="container">
        <h2>Our Location</h2>
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3303.1234567890123!2d28.0473053152587!3d-26.2041029834567!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1e9509a123456789%3A0xabcdef1234567890!2sSandton%20Convention%20Centre!5e0!3m2!1sen!2sza!4v1680000000000!5m2!1sen!2sza"
          width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
          title="Miss South Africa Disability Location Map"></iframe>
      </div>
    </section>

    <!-- Social Media and WhatsApp -->
    <section class="social-whatsapp" aria-label="Social media and WhatsApp contact">
      <div class="container">
        <h2>Connect with Us</h2>
        <ul class="social-icons">
          <li><a href="https://www.facebook.com/misssadisability" aria-label="Facebook" target="_blank" rel="noopener"><img src="/images/icons/facebook.svg" alt="" loading="lazy" /></a></li>
          <li><a href="https://www.instagram.com/misssadisability" aria-label="Instagram" target="_blank" rel="noopener"><img src="/images/icons/instagram.svg" alt="" loading="lazy" /></a></li>
          <li><a href="https://www.youtube.com/misssadisability" aria-label="YouTube" target="_blank" rel="noopener"><img src="/images/icons/youtube.svg" alt="" loading="lazy" /></a></li>
          <li><a href="https://wa.me/27123456789" aria-label="WhatsApp chat" target="_blank" rel="noopener"><img src="/images/icons/whatsapp.svg" alt="WhatsApp icon" loading="lazy" /></a></li>
        </ul>
      </div>
    </section>
  </main>

  <footer role="contentinfo" aria-label="Site Footer">
    <div class="footer-container">
      <p>© 2024 Miss South Africa Disability. All Rights Reserved.</p>
      <nav aria-label="Footer social media">
        <ul class="social-icons">
          <li><a href="https://www.facebook.com/misssadisability" aria-label="Facebook" target="_blank" rel="noopener"><img src="/images/icons/facebook.svg" alt="" loading="lazy" /></a></li>
          <li><a href="https://www.instagram.com/misssadisability" aria-label="Instagram" target="_blank" rel="noopener"><img src="/images/icons/instagram.svg" alt="" loading="lazy" /></a></li>
          <li><a href="https://www.youtube.com/misssadisability" aria-label="YouTube" target="_blank" rel="noopener"><img src="/images/icons/youtube.svg" alt="" loading="lazy" /></a></li>
        </ul>
      </nav>
    </div>
  </footer>

  <script src="/js/main.js" defer></script>
</body>
</html>
